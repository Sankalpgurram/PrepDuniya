<div class="auth-container">
  <div class="auth-content">
    <mat-card class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join PrepDuniya and start achieving.</p>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <input matInput formControlName="name" placeholder="John Doe">
          <mat-icon matPrefix>person</mat-icon>
          <mat-error *ngIf="signupForm.get('name')?.hasError('required')">Name is required</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="you@example.com">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="signupForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="signupForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" placeholder="Password (min 6 char)">
          <mat-icon matPrefix>lock</mat-icon>
          <mat-error *ngIf="signupForm.get('password')?.hasError('required')">Password is required</mat-error>
          <mat-error *ngIf="signupForm.get('password')?.hasError('minlength')">Minimum 6 characters needed</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" class="submit-button" [disabled]="signupForm.invalid || isLoading">
          <span *ngIf="!isLoading">Sign Up</span>
          <mat-spinner diameter="20" *ngIf="isLoading" class="button-spinner"></mat-spinner>
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="google-auth">
        <div id="google-btn-signup"></div>
      </div>

      <div class="auth-footer">
        <p>Already have an account? <a routerLink="/login">Log in</a></p>
      </div>
    </mat-card>
  </div>
</div>
