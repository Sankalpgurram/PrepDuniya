<div class="auth-container">
  <div class="auth-content">
    <mat-card class="auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Login to continue your preparation journey.</p>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="you@example.com">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">Email is required</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Please enter a valid email</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" type="password" placeholder="Password">
          <mat-icon matPrefix>lock</mat-icon>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password is required</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" class="submit-button" [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="!isLoading">Login</span>
          <mat-spinner diameter="20" *ngIf="isLoading" class="button-spinner"></mat-spinner>
        </button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="google-auth">
        <div id="google-btn"></div>
      </div>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/signup">Sign up</a></p>
      </div>
    </mat-card>
  </div>
</div>
